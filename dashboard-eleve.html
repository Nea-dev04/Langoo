<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Langoo — Mon espace élève</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f5f0; --bg2: #edeae3; --text: #1a1814; --muted: #6b6760;
      --accent: #c8a96e; --accent2: #2d4a3e;
      --glass: rgba(247,245,240,0.92); --border: rgba(26,24,20,0.1);
      --shadow: 0 8px 40px rgba(26,24,20,0.08); --radius: 16px;
      --sidebar-w: 240px;
    }
    [data-theme="dark"] {
      --bg: #111009; --bg2: #1c1a14; --text: #f0ece2; --muted: #8a8578;
      --accent: #c8a96e; --accent2: #4a7c66;
      --glass: rgba(17,16,9,0.92); --border: rgba(240,236,226,0.08);
      --shadow: 0 8px 40px rgba(0,0,0,0.3);
    }
    html { scroll-behavior: smooth; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; transition:background 0.3s,color 0.3s; overflow-x:hidden; }

    /* ── APP SHELL ── */
    .app { display:grid; grid-template-columns:var(--sidebar-w) 1fr; min-height:100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      position:fixed; top:0; left:0; bottom:0; width:var(--sidebar-w);
      background:var(--bg2); border-right:1px solid var(--border);
      display:flex; flex-direction:column; z-index:50; overflow-y:auto;
    }
    .sidebar-logo {
      padding:1.5rem 1.4rem 1rem;
      font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:600;
      color:var(--text); text-decoration:none; display:block; border-bottom:1px solid var(--border);
    }
    .sidebar-logo span { color:var(--accent); }

    .sidebar-user { padding:1rem 1.2rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:0.7rem; }
    .user-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--accent2),var(--accent)); display:flex; align-items:center; justify-content:center; font-size:0.78rem; font-weight:600; color:#fff; flex-shrink:0; }
    .user-name { font-size:0.82rem; font-weight:500; }
    .user-role { font-size:0.7rem; color:var(--muted); }

    .sidebar-nav { padding:1rem 0.8rem; flex:1; }
    .nav-section-title { font-size:0.62rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); padding:0 0.6rem; margin:1rem 0 0.4rem; }
    .nav-item {
      display:flex; align-items:center; gap:0.7rem;
      padding:0.6rem 0.8rem; border-radius:10px;
      font-size:0.84rem; cursor:pointer; transition:all 0.15s;
      color:var(--muted); text-decoration:none; margin-bottom:2px;
      border:1px solid transparent; position:relative;
    }
    .nav-item:hover { background:var(--bg); color:var(--text); }
    .nav-item.active { background:var(--text); color:var(--bg); }
    .nav-icon { font-size:1rem; width:20px; text-align:center; flex-shrink:0; }
    .nav-badge { margin-left:auto; background:var(--accent); color:#fff; font-size:0.62rem; font-weight:600; padding:0.1rem 0.45rem; border-radius:100px; }
    .nav-item.active .nav-badge { background:var(--bg); color:var(--text); }

    .sidebar-bottom { padding:1rem 0.8rem; border-top:1px solid var(--border); }

    /* ── MAIN ── */
    .main { margin-left:var(--sidebar-w); display:flex; flex-direction:column; min-height:100vh; }

    /* TOPBAR */
    .topbar {
      position:sticky; top:0; z-index:40;
      background:var(--glass); backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      padding:1rem 2rem; display:flex; align-items:center; justify-content:space-between;
    }
    .topbar-title { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:600; }
    .topbar-right { display:flex; align-items:center; gap:0.8rem; }
    .topbar-btn { background:none; border:1px solid var(--border); color:var(--muted); cursor:pointer; width:34px; height:34px; border-radius:50%; font-size:0.9rem; display:flex; align-items:center; justify-content:center; transition:all 0.2s; position:relative; }
    .topbar-btn:hover { border-color:var(--accent); color:var(--accent); }
    .notif-dot { position:absolute; top:4px; right:4px; width:7px; height:7px; border-radius:50%; background:var(--accent); border:2px solid var(--bg); }
    .btn-find-prof { background:var(--text); color:var(--bg); border:none; border-radius:100px; padding:0.5rem 1.1rem; font-size:0.82rem; font-weight:500; cursor:pointer; font-family:'DM Sans',sans-serif; transition:opacity 0.2s; text-decoration:none; display:inline-flex; align-items:center; gap:0.4rem; }
    .btn-find-prof:hover { opacity:0.8; }

    /* CONTENT */
    .content { padding:2rem; flex:1; }

    /* ── PANELS ── */
    .panel { display:none; }
    .panel.active { display:block; }

    /* ── OVERVIEW ── */
    .welcome-bar { margin-bottom:2rem; }
    .welcome-bar h2 { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:300; }
    .welcome-bar h2 em { font-style:italic; color:var(--accent); }
    .welcome-bar p { font-size:0.88rem; color:var(--muted); margin-top:0.3rem; }

    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:2rem; }
    .stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:1.3rem 1.5rem; transition:transform 0.2s; }
    .stat-card:hover { transform:translateY(-2px); }
    .stat-card-icon { font-size:1.4rem; margin-bottom:0.7rem; }
    .stat-card-num { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:600; line-height:1; }
    .stat-card-label { font-size:0.75rem; color:var(--muted); margin-top:0.3rem; text-transform:uppercase; letter-spacing:0.08em; }
    .stat-card-trend { font-size:0.72rem; color:#2ecc71; margin-top:0.4rem; }

    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-bottom:1.5rem; }
    .three-col { display:grid; grid-template-columns:2fr 1fr; gap:1.5rem; margin-bottom:1.5rem; }

    /* CARD */
    .card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); }
    .card-header { padding:1.2rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .card-title { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:600; }
    .card-link { font-size:0.78rem; color:var(--accent); cursor:pointer; text-decoration:none; }
    .card-link:hover { text-decoration:underline; }
    .card-body { padding:1.2rem 1.5rem; }

    /* PROCHAIN COURS */
    .next-cours-card {
      background:var(--text); color:var(--bg);
      border-radius:var(--radius); padding:1.5rem;
      margin-bottom:1.5rem; position:relative; overflow:hidden;
    }
    .next-cours-card::before { content:''; position:absolute; top:-40px; right:-40px; width:140px; height:140px; border-radius:50%; background:rgba(200,169,110,0.15); }
    .next-label { font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; opacity:0.6; margin-bottom:0.8rem; }
    .next-title { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:600; margin-bottom:0.4rem; }
    .next-info { font-size:0.85rem; opacity:0.7; display:flex; align-items:center; gap:0.8rem; flex-wrap:wrap; }
    .next-countdown { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:600; margin:1rem 0 0.5rem; }
    .countdown-label { font-size:0.72rem; opacity:0.6; }
    .next-actions { display:flex; gap:0.7rem; margin-top:1.2rem; }
    .btn-join { background:var(--accent); color:#fff; border:none; border-radius:100px; padding:0.6rem 1.4rem; font-size:0.82rem; font-weight:500; cursor:pointer; font-family:'DM Sans',sans-serif; transition:opacity 0.2s; }
    .btn-join:hover { opacity:0.85; }
    .btn-msg { background:rgba(255,255,255,0.15); color:var(--bg); border:1px solid rgba(255,255,255,0.2); border-radius:100px; padding:0.6rem 1.2rem; font-size:0.82rem; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.2s; }
    .btn-msg:hover { background:rgba(255,255,255,0.25); }

    /* COURS LIST */
    .cours-item { display:flex; align-items:center; gap:1rem; padding:0.9rem 0; border-bottom:1px solid var(--border); }
    .cours-item:last-child { border-bottom:none; }
    .cours-avatar { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--accent2),var(--accent)); display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:600; color:#fff; flex-shrink:0; }
    .cours-info { flex:1; min-width:0; }
    .cours-prof { font-size:0.85rem; font-weight:500; }
    .cours-details { font-size:0.75rem; color:var(--muted); margin-top:0.15rem; }
    .cours-badge { font-size:0.68rem; padding:0.2rem 0.6rem; border-radius:100px; font-weight:500; flex-shrink:0; }
    .badge-upcoming { background:rgba(200,169,110,0.12); color:var(--accent); border:1px solid rgba(200,169,110,0.25); }
    .badge-done { background:rgba(45,74,62,0.1); color:var(--accent2); border:1px solid rgba(45,74,62,0.2); }
    .badge-cancelled { background:rgba(192,57,43,0.08); color:#c0392b; border:1px solid rgba(192,57,43,0.15); }

    /* PROGRESS */
    .progress-item { margin-bottom:1.2rem; }
    .progress-header { display:flex; justify-content:space-between; font-size:0.82rem; margin-bottom:0.5rem; }
    .progress-label { font-weight:500; }
    .progress-pct { color:var(--muted); }
    .progress-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:3px; transition:width 1s ease; }

    /* PROF FAVORIS */
    .fav-item { display:flex; align-items:center; gap:0.8rem; padding:0.7rem 0; border-bottom:1px solid var(--border); }
    .fav-item:last-child { border-bottom:none; }
    .fav-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--accent2),var(--accent)); display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:600; color:#fff; flex-shrink:0; }
    .fav-info { flex:1; }
    .fav-name { font-size:0.82rem; font-weight:500; }
    .fav-langue { font-size:0.72rem; color:var(--muted); }
    .btn-book-sm { background:var(--text); color:var(--bg); border:none; border-radius:100px; padding:0.35rem 0.9rem; font-size:0.72rem; cursor:pointer; font-family:'DM Sans',sans-serif; transition:opacity 0.2s; }
    .btn-book-sm:hover { opacity:0.75; }

    /* ── PANEL COURS ── */
    .cours-filters { display:flex; gap:0.5rem; margin-bottom:1.5rem; flex-wrap:wrap; }
    .filter-pill { border:1px solid var(--border); border-radius:100px; padding:0.35rem 0.9rem; font-size:0.78rem; cursor:pointer; background:var(--bg2); color:var(--muted); transition:all 0.2s; }
    .filter-pill:hover,.filter-pill.active { background:var(--text); color:var(--bg); border-color:var(--text); }

    .cours-table { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .table-header { display:grid; grid-template-columns:2fr 1.5fr 1fr 1fr 1fr; gap:1rem; padding:0.8rem 1.5rem; background:var(--bg); border-bottom:1px solid var(--border); font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
    .table-row { display:grid; grid-template-columns:2fr 1.5fr 1fr 1fr 1fr; gap:1rem; padding:1rem 1.5rem; border-bottom:1px solid var(--border); align-items:center; transition:background 0.15s; }
    .table-row:last-child { border-bottom:none; }
    .table-row:hover { background:var(--bg); }
    .table-prof { display:flex; align-items:center; gap:0.7rem; }
    .table-avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--accent2),var(--accent)); display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:600; color:#fff; flex-shrink:0; }
    .table-name { font-size:0.85rem; font-weight:500; }
    .table-langue { font-size:0.72rem; color:var(--muted); }
    .table-cell { font-size:0.83rem; color:var(--muted); }
    .table-price { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:600; color:var(--text); }
    .btn-avis { background:none; border:1px solid var(--border); border-radius:100px; padding:0.25rem 0.7rem; font-size:0.7rem; cursor:pointer; color:var(--muted); font-family:'DM Sans',sans-serif; transition:all 0.2s; }
    .btn-avis:hover { border-color:var(--accent); color:var(--accent); }

    /* ── MESSAGERIE ── */
    .messages-layout { display:grid; grid-template-columns:280px 1fr; gap:0; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); height:calc(100vh - 180px); overflow:hidden; }
    .conv-list { border-right:1px solid var(--border); overflow-y:auto; }
    .conv-search { padding:1rem; border-bottom:1px solid var(--border); }
    .conv-search input { width:100%; padding:0.6rem 0.9rem; border:1px solid var(--border); border-radius:100px; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.82rem; outline:none; }
    .conv-item { display:flex; align-items:center; gap:0.8rem; padding:0.9rem 1rem; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.15s; }
    .conv-item:hover { background:var(--bg); }
    .conv-item.active { background:var(--bg); border-left:2px solid var(--accent); }
    .conv-avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,var(--accent2),var(--accent)); display:flex; align-items:center; justify-content:center; font-size:0.78rem; font-weight:600; color:#fff; flex-shrink:0; position:relative; }
    .conv-online { position:absolute; bottom:1px; right:1px; width:9px; height:9px; border-radius:50%; background:#2ecc71; border:2px solid var(--bg2); }
    .conv-info { flex:1; min-width:0; }
    .conv-name { font-size:0.83rem; font-weight:500; }
    .conv-last { font-size:0.72rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .conv-meta { display:flex; flex-direction:column; align-items:flex-end; gap:0.3rem; }
    .conv-time { font-size:0.68rem; color:var(--muted); }
    .conv-unread { background:var(--accent); color:#fff; font-size:0.62rem; font-weight:600; width:17px; height:17px; border-radius:50%; display:flex; align-items:center; justify-content:center; }

    .chat-area { display:flex; flex-direction:column; }
    .chat-header { padding:1rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:1rem; }
    .chat-prof-name { font-size:0.95rem; font-weight:500; }
    .chat-prof-status { font-size:0.72rem; color:#2ecc71; }
    .chat-messages { flex:1; overflow-y:auto; padding:1.5rem; display:flex; flex-direction:column; gap:1rem; }
    .msg { max-width:70%; }
    .msg-bubble { padding:0.7rem 1rem; border-radius:16px; font-size:0.85rem; line-height:1.5; }
    .msg.received .msg-bubble { background:var(--bg); border:1px solid var(--border); border-bottom-left-radius:4px; }
    .msg.sent { align-self:flex-end; }
    .msg.sent .msg-bubble { background:var(--text); color:var(--bg); border-bottom-right-radius:4px; }
    .msg-time { font-size:0.65rem; color:var(--muted); margin-top:0.3rem; }
    .msg.sent .msg-time { text-align:right; }
    .chat-input-bar { padding:1rem 1.5rem; border-top:1px solid var(--border); display:flex; gap:0.7rem; align-items:center; }
    .chat-input { flex:1; padding:0.7rem 1rem; border:1px solid var(--border); border-radius:100px; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.88rem; outline:none; transition:border-color 0.2s; }
    .chat-input:focus { border-color:var(--accent); }
    .btn-send { background:var(--text); color:var(--bg); border:none; border-radius:50%; width:36px; height:36px; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; transition:opacity 0.2s; flex-shrink:0; }
    .btn-send:hover { opacity:0.8; }

    /* ── MODAL AVIS ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px); opacity:0; pointer-events:none; transition:opacity 0.25s; }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:2rem; max-width:420px; width:90%; transform:translateY(20px); transition:transform 0.25s; }
    .modal-overlay.open .modal { transform:translateY(0); }
    .modal-title { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:600; margin-bottom:0.3rem; }
    .modal-sub { font-size:0.82rem; color:var(--muted); margin-bottom:1.5rem; }
    .stars-selector { display:flex; gap:0.4rem; margin-bottom:1.2rem; }
    .star-btn { font-size:1.8rem; background:none; border:none; cursor:pointer; color:var(--border); transition:color 0.15s, transform 0.15s; }
    .star-btn.lit { color:var(--accent); }
    .star-btn:hover { transform:scale(1.2); }
    .avis-textarea { width:100%; padding:0.8rem 1rem; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.88rem; resize:vertical; min-height:100px; outline:none; transition:border-color 0.2s; }
    .avis-textarea:focus { border-color:var(--accent); }
    .modal-actions { display:flex; gap:0.7rem; margin-top:1.2rem; }
    .btn-submit-avis { flex:1; padding:0.75rem; background:var(--text); color:var(--bg); border:none; border-radius:100px; font-family:'DM Sans',sans-serif; font-size:0.88rem; font-weight:500; cursor:pointer; transition:opacity 0.2s; }
    .btn-submit-avis:hover { opacity:0.8; }
    .btn-cancel-avis { padding:0.75rem 1.2rem; background:transparent; color:var(--muted); border:1px solid var(--border); border-radius:100px; font-family:'DM Sans',sans-serif; font-size:0.88rem; cursor:pointer; transition:all 0.2s; }
    .btn-cancel-avis:hover { border-color:var(--text); color:var(--text); }

    /* TOAST */
    .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(20px); background:var(--text); color:var(--bg); padding:0.7rem 1.6rem; border-radius:100px; font-size:0.82rem; font-weight:500; opacity:0; transition:opacity 0.3s,transform 0.3s; z-index:300; pointer-events:none; white-space:nowrap; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* MOBILE */
    @media (max-width:900px) {
      .app { grid-template-columns:1fr; }
      .sidebar { display:none; }
      .main { margin-left:0; }
      .stats-row { grid-template-columns:1fr 1fr; }
      .two-col,.three-col { grid-template-columns:1fr; }
      .messages-layout { grid-template-columns:1fr; height:auto; }
      .conv-list { display:none; }
      .table-header,.table-row { grid-template-columns:2fr 1fr 1fr; }
      .table-row > *:nth-child(4) { display:none; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <a href="home.html" class="sidebar-logo">Lang<span>oo</span></a>
    <div class="sidebar-user">
      <div class="user-avatar">KA</div>
      <div><div class="user-name">Karim A.</div><div class="user-role">Élève</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">Principal</div>
      <a class="nav-item active" onclick="switchPanel('overview', this)">
        <span class="nav-icon">⊞</span> Tableau de bord
      </a>
      <a class="nav-item" onclick="switchPanel('cours', this)">
        <span class="nav-icon">📅</spa
