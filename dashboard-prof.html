<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Langoo — Mon espace professeur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#f7f5f0; --bg2:#edeae3; --text:#1a1814; --muted:#6b6760;
      --accent:#c8a96e; --accent2:#2d4a3e;
      --glass:rgba(247,245,240,0.92); --border:rgba(26,24,20,0.1);
      --shadow:0 8px 40px rgba(26,24,20,0.08); --radius:16px;
      --sidebar-w:240px; --green:#2ecc71; --red:#e74c3c;
    }
    [data-theme="dark"] {
      --bg:#111009; --bg2:#1c1a14; --text:#f0ece2; --muted:#8a8578;
      --accent:#c8a96e; --accent2:#4a7c66;
      --glass:rgba(17,16,9,0.92); --border:rgba(240,236,226,0.08);
      --shadow:0 8px 40px rgba(0,0,0,0.3);
    }
    html { scroll-behavior:smooth; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; transition:background 0.3s,color 0.3s; overflow-x:hidden; }

    /* APP SHELL */
    .app { display:grid; grid-template-columns:var(--sidebar-w) 1fr; min-height:100vh; }

    /* SIDEBAR */
    .sidebar { position:fixed; top:0; left:0; bottom:0; width:var(--sidebar-w); background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; z-index:50; overflow-y:auto; }
    .sidebar-logo { padding:1.5rem 1.4rem 1rem; font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:600; color:var(--text); text-decoration:none; display:block; border-bottom:1px solid var(--border); }
    .sidebar-logo span { color:var(--accent); }
    .sidebar-user { padding:1rem 1.2rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:0.7rem; }
    .user-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--accent2),var(--accent)); display:flex; align-items:center; justify-content:center; font-size:0.78rem; font-weight:600; color:#fff; flex-shrink:0; }
    .user-name { font-size:0.82rem; font-weight:500; }
    .user-role { font-size:0.7rem; color:var(--accent); }
    .sidebar-nav { padding:1rem 0.8rem; flex:1; }
    .nav-section-title { font-size:0.62rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); padding:0 0.6rem; margin:1rem 0 0.4rem; }
    .nav-item { display:flex; align-items:center; gap:0.7rem; padding:0.6rem 0.8rem; border-radius:10px; font-size:0.84rem; cursor:pointer; transition:all 0.15s; color:var(--muted); text-decoration:none; margin-bottom:2px; border:1px solid transparent; }
    .nav-item:hover { background:var(--bg); color:var(--text); }
    .nav-item.active { background:var(--text); color:var(--bg); }
    .nav-icon { font-size:1rem; width:20px; text-align:center; flex-shrink:0; }
    .nav-badge { margin-left:auto; background:var(--accent); color:#fff; font-size:0.62rem; font-weight:600; padding:0.1rem 0.45rem; border-radius:100px; }
    .nav-item.active .nav-badge { background:var(--bg); color:var(--text); }
    .sidebar-bottom { padding:1rem 0.8rem; border-top:1px solid var(--border); }

    /* MAIN */
    .main { margin-left:var(--sidebar-w); display:flex; flex-direction:column; min-height:100vh; }
    .topbar { position:sticky; top:0; z-index:40; background:var(--glass); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:1rem 2rem; display:flex; align-items:center; justify-content:space-between; }
    .topbar-title { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:600; }
    .topbar-right { display:flex; align-items:center; gap:0.8rem; }
    .topbar-btn { background:none; border:1px solid var(--border); color:var(--muted); cursor:pointer; width:34px; height:34px; border-radius:50%; font-size:0.9rem; display:flex; align-items:center; justify-content:center; transition:all 0.2s; position:relative; }
    .topbar-btn:hover { border-color:var(--accent); color:var(--accent); }
    .notif-dot { position:absolute; top:4px; right:4px; width:7px; height:7px; border-radius:50%; background:var(--accent); border:2px solid var(--bg); }
    .btn-primary { background:var(--text); color:var(--bg); border:none; border-radius:100px; padding:0.5rem 1.1rem; font-size:0.82rem; font-weight:500; cursor:pointer; font-family:'DM Sans',sans-serif; transition:opacity 0.2s; display:inline-flex; align-items:center; gap:0.4rem; }
    .btn-primary:hover { opacity:0.8; }
    .content { padding:2rem; flex:1; }

    /* PANELS */
    .panel { display:none; }
    .panel.active { display:block; }

    /* CARDS */
    .card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); }
    .card-header { padding:1.2rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .card-title { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:600; }
    .card-link { font-size:0.78rem; color:var(--accent); cursor:pointer; }
    .card-link:hover { text-decoration:underline; }
    .card-body { padding:1.2rem 1.5rem; }

    /* GRIDS */
    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:1.5rem; }
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-bottom:1.5rem; }
    .three-col { display:grid; grid-template-columns:2fr 1fr; gap:1.5rem; margin-bottom:1.5rem; }

    /* STAT CARDS */
    .stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:1.3rem 1.5rem; transition:transform 0.2s; position:relative; overflow:hidden; }
    .stat-card:hover { transform:translateY(-2px); }
    .stat-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--accent2),var(--accent)); opacity:0.5; }
    .stat-card-icon { font-size:1.4rem; margin-bottom:0.7rem; }
    .stat-card-num { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:600; line-height:1; }
    .stat-card-label { font-size:0.75rem; color:var(--muted); margin-top:0.3rem; text-transform:uppercase; letter-spacing:0.08em; }
    .stat-card-trend { font-size:0.72rem; margin-top:0.4rem; }
    .trend-up { color:var(--green); }
    .trend-down { color:var(--red); }

    /* GAIN HERO */
    .gain-hero { background:var(--text); color:var(--bg); border-radius:var(--radius); padding:2rem; margin-bottom:1.5rem; position:relative; overflow:hidden; }
    .gain-hero::before { content:''; position:absolute; top:-50px; right:-50px; width:180px; height:180px; border-radius:50%; background:rgba(200,169,110,0.12); }
    .gain-hero::after { content:''; position:absolute; bottom:-30px; left:30%; width:120px; height:120px; border-radius:50%; background:rgba(45,74,62,0.15); }
    .gain-hero-inner { position:relative; z-index:1; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1.5rem; }
    .gain-label { font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; opacity:0.6; margin-bottom:0.5rem; }
    .gain-amount { font-family:'Cormorant Garamond',serif; font-size:3.5rem; font-weight:600; line-height:1; }
    .gain-sub { font-size:0.82rem; opacity:0.6; margin-top:0.3rem; }
    .gain-stats { display:flex; gap:2.5rem; }
    .gain-stat { text-align:center; }
    .gain-stat-num { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:600; }
    .gain-stat-label { font-size:0.7rem; opacity:0.6; text-transform:uppercase; letter-spacing:0.08em; margin-top:0.2rem; }
    .btn-withdraw { background:var(--accent); color:#fff; border:none; border-radius:100px; padding:0.65rem 1.5rem; font-size:0.85rem; font-weight:500; cursor:pointer; font-family:'DM Sans',sans-serif; transition:opacity 0.2s; align-self:flex-start; }
    .btn-withdraw:hover { opacity:0.85; }

    /* CHART SIMPLE */
    .chart-wrap { margin-top:0.5rem; }
    .chart-bars { display:flex; align-items:flex-end; gap:0.4rem; height:80px; }
    .chart-bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:0.3rem; }
    .chart-bar { width:100%; border-radius:4px 4px 0 0; background:linear-gradient(180deg,var(--accent),var(--accent2)); transition:height 0.6s ease; min-height:4px; }
    .chart-bar:hover { opacity:0.8; cursor:pointer; }
    .chart-label { font-size:0.62rem; color:var(--muted); white-space:nowrap; }
    .chart-legend { display:flex; gap:1.5rem; margin-top:1rem; }
    .legend-item { display:flex; align-items:center; gap:0.4rem; font-size:0.72rem; color:var(--muted); }
    .legend-dot { width:8px; height:8px; border-radius:50%; }

    /* SÉANCE TABLE */
    .table-header { display:grid; grid-template-columns:2fr 1.5fr 1fr 1fr 1fr; gap:1rem; padding:0.8rem 1.5rem; background:var(--bg); border-bottom:1px solid var(--border); font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
    .table-row { display:grid; grid-template-columns:2fr 1.5fr 1fr 1fr 1fr; gap:1rem; padding:1rem 1.5rem; border-bottom:1px solid var(--border); align-items:center; transition:background 0.15s; }
    .table-row:last-child { border-bottom:none; }
    .table-row:hover { background:var(--bg); }
    .eleve-info { display:flex; align-items:center; gap:0.7rem; }
    .eleve-avatar { width:32px; height:32px; border-radius:50%; background:var(--bg); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:600; flex-shrink:0; }
    .eleve-name { font-size:0.85rem; font-weight:500; }
    .eleve-langue { font-size:0.72rem; color:var(--muted); }
    .table-cell { font-size:0.83rem; color:var(--muted); }
    .gain-cell { font-family:'Cormorant Garamond',serif; font-size:1.15rem; font-weight:600; color:var(--green); }
    .cours-badge { font-size:0.68rem; padding:0.2rem 0.6rem; border-radius:100px; font-weight:500; }
    .badge-upcoming { background:rgba(200,169,110,0.12); color:var(--accent); border:1px solid rgba(200,169,110,0.25); }
    .badge-done { background:rgba(45,74,62,0.1); color:var(--accent2); border:1px solid rgba(45,74,62,0.2); }
    .badge-cancelled { background:rgba(231,76,60,0.08); color:var(--red); border:1px solid rgba(231,76,60,0.15); }

    /* CALENDRIER DISPO */
    .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
    .cal-month { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:600; }
    .cal-nav { background:none; border:1px solid var(--border); border-radius:50%; width:28px; height:28px; cursor:pointer; color:var(--muted); font-size:0.9rem; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
    .cal-nav:hover { border-color:var(--text); color:var(--text); }
    .cal-days-header { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:4px; }
    .cal-day-name { text-align:center; font-size:0.65rem; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; padding:0.2rem; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
    .cal-day { aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:0.78rem; border-radius:8px; cursor:pointer; transition:all 0.2s; border:1px solid transparent; position:relative; }
    .cal-day.empty { cursor:default; }
    .cal-day.past { color:var(--border); cursor:not-allowed; }
    .cal-day:hover:not(.empty):not(.past) { background:var(--bg); border-color:var(--border); }
    .cal-day.has-cours { background:rgba(200,169,110,0.15); color:var(--accent); border-color:rgba(200,169,110,0.3); font-weight:500; }
    .cal-day.has-cours::after { content:''; position:absolute; bottom:3px; width:4px; height:4px; background:var(--accent); border-radius:50%; }
    .cal-day.selected { background:var(--text); color:var(--bg); border-color:var(--text); }
    .cal-day.today { border-color:var(--accent); }
    .slots-section { margin-top:1.2rem; }
    .slots-title { font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:0.6rem; }
    .slots-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.4rem; }
    .slot-toggle { padding:0.4rem; border:1px solid var(--border); border-radius:8px; font-size:0.75rem; text-align:center; cursor:pointer; background:var(--bg); color:var(--text); transition:all 0.2s; font-family:'DM Sans',sans-serif; }
    .slot-toggle:hover { border-color:var(--accent); }
    .slot-toggle.on { background:var(--accent2); color:#fff; border-color:var(--accent2); }
    .btn-save-dispo { width:100%; padding:0.7rem; background:var(--text); color:var(--bg); border:none; border-radius:100px; font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:500; cursor:pointer; margin-top:1rem; transition:opacity 0.2s; }
    .btn-save-dispo:hover { opacity:0.8; }

    /* NOTATIONS */
    .rating-row { display:flex; align-items:center; gap:1rem; padding:0.8rem 0; border-bottom:1px solid var(--border); }
    .rating-row:last-child { border-bottom:none; }
    .rating-avatar { width:36px; height:36px; border-radius:50%; background:var(--bg); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:0.72rem; font-weight:600; flex-shrink:0; }
    .rating-info { flex:1; }
    .rating-eleve { font-size:0.83rem; font-weight:500; }
    .rating-date { font-size:0.72rem; color:var(--muted); }
    .rating-text { font-size:0.8rem; color:var(--muted); margin-top:0.2rem; font-style:italic; }
    .stars { color:var(--accent); font-size:0.82rem; }

    /* PROFIL FORM */
    .profil-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .field { display:flex; flex-direction:column; gap:0.35rem; }
    .field.full { grid-column:1/-1; }
    .field label { font-size:0.72rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); }
    .field input,.field select,.field textarea { padding:0.7rem 0.9rem; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.88rem; outline:none; transition:border-color 0.2s; }
    .field input:focus,.field select:focus,.field textarea:focus { border-color:var(--accent); }
    .field textarea { resize:vertical; min-height:90px; }
    .tag-input-wrap { display:flex; flex-wrap:wrap; gap:0.4rem; padding:0.6rem 0.8rem; border:1px solid var(--border); border-radius:10px; background:var(--bg); cursor:text; }
    .tag-pill { background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:0.2rem 0.5rem; font-size:0.75rem; display:flex; align-items:center; gap:0.3rem; }
    .tag-remove { cursor:pointer; color:var(--muted); font-size:0.7rem; }
    .tag-remove:hover { color:var(--red); }
    .profil-score { text-align:center; padding:1.5rem; }
    .score-circle { width:80px; height:80px; border-radius:50%; background:conic-gradient(var(--accent) 0% 92%, var(--border) 92% 100%); display:flex; align-items:center; justify-content:center; margin:0 auto 0.8rem; position:relative; }
    .score-circle::before { content:''; position:absolute; inset:8px; border-radius:50%; background:var(--bg2); }
    .score-num { position:relative; z-index:1; font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:600; }
    .score-label { font-size:0.75rem; color:var(--muted); }

    /* MESSAGERIE */
    .messages-layout { display:grid; grid-template-columns:280px 1fr; gap:0; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); height:calc(100vh - 180px); overflow:hidden; }
    .conv-list { border-right:1px solid var(--border); overflow-y:auto; }
    .conv-search { padding:1rem; border-bottom:1px solid var(--border); }
    .conv-search input { width:100%; padding:0.6rem 0.9rem; border:1px solid var(--border); border-radius:100px; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.82rem; outline:none; }
    .conv-item { display:flex; align-items:center; gap:0.8rem; padding:0.9rem 1rem; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.15s; }
    .conv-item:hover { background:var(--bg); }
    .conv-item.active { background:var(--bg); border-left:2px solid var(--accent); }
    .conv-avatar { width:38px; height:38px; border-radius:50%; background:var(--bg); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:0.78rem; font-weight:600; flex-shrink:0; position:relative; }
    .conv-online { position:absolute; bottom:1px; right:1px; width:9px; height:9px; border-radius:50%; background:var(--green); border:2px solid var(--bg2); }
    .conv-name { font-size:0.83rem; font-weight:500; }
    .conv-last { font-size:0.72rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .conv-time { font-size:0.68rem; color:var(--muted); }
    .conv-unread { background:var(--accent); color:#fff; font-size:0.62rem; font-weight:600; width:17px; height:17px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .chat-area { display:flex; flex-direction:column; }
    .chat-header { padding:1rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:1rem; }
    .chat-prof-name { font-size:0.95rem; font-weight:500; }
    .chat-status { font-size:0.72rem; color:var(--green); }
    .chat-messages { flex:1; overflow-y:auto; padding:1.5rem; display:flex; flex-direction:column; gap:1rem; }
    .msg { max-width:70%; }
    .msg-bubble { padding:0.7rem 1rem; border-radius:16px; font-size:0.85rem; line-height:1.5; }
    .msg.received .msg-bubble { background:var(--bg); border:1px solid var(--border); border-bottom-left-radius:4px; }
    .msg.sent { align-self:flex-end; }
    .msg.sent .msg-bubble { background:var(--text); color:var(--bg); border-bottom-right-radius:4px; }
    .msg-time { font-size:0.65rem; color:var(--muted); margin-top:0.3rem; }
    .msg.sent .msg-time { text-align:right; }
    .chat-input-bar { padding:1rem 1.5rem; border-top:1px solid var(--border); display:flex; gap:0.7rem; align-items:center; }
    .chat-input { flex:1; padding:0.7rem 1rem; border:1px solid var(--border); border-radius:100px; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.88rem; outline:none; transition:border-color 0.2s; }
    .chat-input:focus { border-color:var(--accent); }
    .btn-send { background:var(--text); color:var(--bg); border:none; border-radius:50%; width:36px; height:36px; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; transition:opacity 0.2s; flex-shrink:0; }
    .btn-send:hover { opacity:0.8; }

    /* PROGRESS BAR */
    .progress-item { margin-bottom:1rem; }
    .progress-header { display:flex; justify-content:space-between; font-size:0.82rem; margin-bottom:0.4rem; }
    .progress-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:3px; }

    /* TOAST */
    .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(20px); background:var(--text); color:var(--bg); padding:0.7rem 1.6rem; border-radius:100px; font-size:0.82rem; font-weight:500; opacity:0; transition:opacity 0.3s,transform 0.3s; z-index:300; pointer-events:none; white-space:nowrap; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* FILTER PILLS */
    .cours-filters { display:flex; gap:0.5rem; margin-bottom:1.5
