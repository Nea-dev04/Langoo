<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Langoo — Apprends une langue avec un vrai prof</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --bg2: #edeae3;
      --text: #1a1814;
      --muted: #6b6760;
      --accent: #c8a96e;
      --accent2: #2d4a3e;
      --glass: rgba(247,245,240,0.7);
      --border: rgba(26,24,20,0.1);
      --shadow: 0 8px 40px rgba(26,24,20,0.08);
      --radius: 16px;
    }
    [data-theme="dark"] {
      --bg: #111009;
      --bg2: #1c1a14;
      --text: #f0ece2;
      --muted: #8a8578;
      --accent: #c8a96e;
      --accent2: #4a7c66;
      --glass: rgba(17,16,9,0.7);
      --border: rgba(240,236,226,0.08);
      --shadow: 0 8px 40px rgba(0,0,0,0.3);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 3rem;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem; font-weight: 600;
      color: var(--text); text-decoration: none;
      letter-spacing: 0.02em;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; align-items: center; gap: 2rem; }
    .nav-links a {
      font-size: 0.85rem; font-weight: 400; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted);
      text-decoration: none; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-cta {
      background: var(--text); color: var(--bg) !important;
      padding: 0.6rem 1.4rem; border-radius: 100px;
      font-weight: 500 !important; letter-spacing: 0.04em !important;
      transition: background 0.2s, opacity 0.2s !important;
    }
    .nav-cta:hover { opacity: 0.8; }
    .theme-toggle {
      background: none; border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
      width: 36px; height: 36px; border-radius: 50%;
      font-size: 1rem; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 8rem 3rem 4rem;
      position: relative; overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0; z-index: 0;
      background: 
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(200,169,110,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 10% 80%, rgba(45,74,62,0.08) 0%, transparent 60%);
    }
    .hero-grid {
      position: absolute; inset: 0; z-index: 0; opacity: 0.03;
      background-image: linear-gradient(var(--text) 1px, transparent 1px),
                        linear-gradient(90deg, var(--text) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .hero-content {
      position: relative; z-index: 1;
      max-width: 900px; text-align: center;
    }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 0.5rem;
      border: 1px solid var(--border); border-radius: 100px;
      padding: 0.4rem 1rem; margin-bottom: 2.5rem;
      font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); background: var(--glass); backdrop-filter: blur(10px);
      animation: fadeUp 0.6s ease both;
    }
    .hero-tag-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.5rem, 8vw, 7rem);
      font-weight: 300; line-height: 1.05;
      letter-spacing: -0.02em;
      animation: fadeUp 0.6s 0.1s ease both;
    }
    h1 em {
      font-style: italic; color: var(--accent);
    }
    h1 strong {
      font-weight: 600; display: block;
    }
    .hero-sub {
      margin-top: 1.8rem;
      font-size: 1.05rem; font-weight: 300;
      color: var(--muted); line-height: 1.7; max-width: 560px; margin-inline: auto;
      animation: fadeUp 0.6s 0.2s ease both;
    }
    .hero-actions {
      margin-top: 2.8rem;
      display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
      animation: fadeUp 0.6s 0.3s ease both;
    }
    .btn-primary {
      background: var(--text); color: var(--bg);
      padding: 0.9rem 2.2rem; border-radius: 100px;
      font-size: 0.9rem; font-weight: 500; letter-spacing: 0.04em;
      text-decoration: none; border: none; cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-primary:hover { opacity: 0.8; transform: translateY(-1px); }
    .btn-secondary {
      background: transparent; color: var(--text);
      padding: 0.9rem 2.2rem; border-radius: 100px;
      font-size: 0.9rem; font-weight: 400; letter-spacing: 0.04em;
      text-decoration: none; border: 1px solid var(--border); cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-secondary:hover { border-color: var(--text); transform: translateY(-1px); }

    .hero-stats {
      margin-top: 4rem;
      display: flex; gap: 3rem; justify-content: center; flex-wrap: wrap;
      animation: fadeUp 0.6s 0.4s ease both;
    }
    .stat { text-align: center; }
    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem; font-weight: 600; color: var(--text);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); margin-top: 0.3rem;
    }

    /* ── LANGUES ── */
    .langues-strip {
      padding: 2rem 0;
      overflow: hidden;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }
    .langues-track {
      display: flex; gap: 4rem; align-items: center;
      animation: scroll 20s linear infinite;
      width: max-content;
    }
    @keyframes scroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }
    .langue-item {
      display: flex; align-items: center; gap: 0.8rem;
      font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); white-space: nowrap;
    }
    .langue-icon { font-size: 1.4rem; }

    /* ── SECTION TITRE ── */
    .section { padding: 7rem 3rem; }
    .section-label {
      font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 1rem; display: block;
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 4vw, 3.5rem);
      font-weight: 300; line-height: 1.15;
      max-width: 600px;
    }
    .section-title em { font-style: italic; color: var(--accent); }

    /* ── COMMENT ÇA MARCHE ── */
    .steps { max-width: 1100px; margin: 0 auto; }
    .steps-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 2rem; margin-top: 4rem;
    }
    .step-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      position: relative; overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .step-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
    .step-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }
    .step-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4rem; font-weight: 300; color: var(--border);
      line-height: 1; margin-bottom: 1.5rem;
    }
    .step-icon { font-size: 1.8rem; margin-bottom: 1rem; }
    .step-card h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 600; margin-bottom: 0.7rem;
    }
    .step-card p { font-size: 0.9rem; color: var(--muted); line-height: 1.7; }

    /* ── PROFS ── */
    .profs-section { background: var(--bg2); }
    .profs-inner { max-width: 1100px; margin: 0 auto; }
    .profs-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem; margin-bottom: 3rem;
    }
    .profs-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .prof-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.8rem;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }
    .prof-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
    .prof-top { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.2rem; }
    .prof-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; color: #fff; font-weight: 600; flex-shrink: 0;
    }
    .prof-info h4 {
      font-size: 0.95rem; font-weight: 500;
    }
    .prof-info p { font-size: 0.8rem; color: var(--muted); }
    .prof-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 100px; padding: 0.3rem 0.8rem;
      font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted);
    }
    .prof-badges { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    .prof-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1rem; }
    .prof-tag {
      font-size: 0.72rem; color: var(--muted);
      background: var(--bg2); border-radius: 4px; padding: 0.2rem 0.5rem;
    }
    .stars { color: var(--accent); font-size: 0.8rem; letter-spacing: 0.05em; }
    .prof-price {
      margin-top: 1.2rem; padding-top: 1.2rem;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .price-amount {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem; font-weight: 600;
    }
    .price-label { font-size: 0.75rem; color: var(--muted); }
    .btn-reserve {
      background: var(--text); color: var(--bg);
      border: none; border-radius: 100px;
      padding: 0.5rem 1.2rem; font-size: 0.8rem; font-weight: 500;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-reserve:hover { opacity: 0.7; }

    /* ── POURQUOI LANGOO ── */
    .why-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 5rem;
      align-items: center; max-width: 1100px; margin: 0 auto;
    }
    .why-visual {
      position: relative; aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .why-orb {
      position: absolute;
      border-radius: 50%; filter: blur(40px); opacity: 0.3;
    }
    .why-orb-1 {
      width: 300px; height: 300px;
      background: var(--accent);
      animation: float 6s ease-in-out infinite;
    }
    .why-orb-2 {
      width: 200px; height: 200px;
      background: var(--accent2);
      animation: float 8s ease-in-out infinite reverse;
      top: 20%; right: 10%;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
    .why-card-center {
      position: relative; z-index: 1;
      background: var(--glass); backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 2rem; width: 80%; text-align: center;
    }
    .why-card-center .big-icon { font-size: 3rem; margin-bottom: 1rem; }
    .why-card-center h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem; margin-bottom: 0.5rem;
    }
    .why-card-center p { font-size: 0.85rem; color: var(--muted); }

    .why-list { list-style: none; margin-top: 3rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .why-item { display: flex; gap: 1.2rem; align-items: flex-start; }
    .why-icon {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      background: var(--bg2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
    }
    .why-item h4 { font-size: 0.95rem; font-weight: 500; margin-bottom: 0.2rem; }
    .why-item p { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }

    /* ── TARIFS ── */
    .tarifs-section { background: var(--bg2); }
    .tarifs-inner { max-width: 900px; margin: 0 auto; text-align: center; }
    .tarifs-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem; margin-top: 3rem;
    }
    .tarif-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 2.5rem 2rem;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .tarif-card.featured {
      background: var(--text); color: var(--bg);
      border-color: var(--text);
      transform: scale(1.03);
    }
    .tarif-card:hover { transform: translateY(-4px) scale(1.01); box-shadow: var(--shadow); }
    .tarif-card.featured:hover { transform: translateY(-4px) scale(1.04); }
    .tarif-langue {
      font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 0.5rem; display: block;
    }
    .tarif-card.featured .tarif-langue { color: var(--accent); }
    .tarif-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.5rem; font-weight: 600; line-height: 1;
      margin: 1rem 0 0.3rem;
    }
    .tarif-per { font-size: 0.8rem; opacity: 0.6; }
    .tarif-desc { font-size: 0.85rem; opacity: 0.7; margin: 1rem 0 1.5rem; line-height: 1.6; }
    .tarif-features { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.8rem; }
    .tarif-features li { font-size: 0.82rem; opacity: 0.8; display: flex; align-items: center; gap: 0.5rem; }
    .tarif-features li::before { content: '✓'; color: var(--accent); font-weight: 600; }
    .btn-tarif {
      width: 100%; padding: 0.8rem; border-radius: 100px;
      font-size: 0.85rem; font-weight: 500; cursor: pointer;
      border: 1px solid currentColor; background: transparent;
      color: inherit; transition: all 0.2s;
    }
    .tarif-card.featured .btn-tarif {
      background: var(--bg); color: var(--text); border-color: var(--bg);
    }
    .btn-tarif:hover { opacity: 0.7; }

    /* ── TEMOIGNAGES ── */
    .temoignages-inner { max-width: 1100px; margin: 0 auto; }
    .temo-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem; margin-top: 3rem;
    }
    .temo-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 2rem;
    }
    .temo-quote {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem; font-weight: 300; line-height: 1.6;
      font-style: italic; margin-bottom: 1.5rem;
      color: var(--text);
    }
    .temo-author { display: flex; align-items: center; gap: 0.8rem; }
    .temo-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent2); display: flex; align-items: center;
      justify-content: center; font-size: 0.8rem; font-weight: 600; color: #fff;
    }
    .temo-name { font-size: 0.85rem; font-weight: 500; }
    .temo-info { font-size: 0.75rem; color: var(--muted); }

    /* ── CTA FINAL ── */
    .cta-section {
      padding: 7rem 3rem;
      text-align: center;
      position: relative; overflow: hidden;
    }
    .cta-bg {
      position: absolute; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 70% 80% at 50% 50%, rgba(200,169,110,0.08) 0%, transparent 70%);
    }
    .cta-inner { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }
    .cta-inner h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 300; line-height: 1.1; margin-bottom: 1.5rem;
    }
    .cta-inner h2 em { font-style: italic; color: var(--accent); }
    .cta-inner p { font-size: 1rem; color: var(--muted); margin-bottom: 2.5rem; line-height: 1.7; }

    /* ── FOOTER ── */
    footer {
      padding: 3rem;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
    }
    .footer-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 600; color: var(--text);
    }
    .footer-logo span { color: var(--accent); }
    .footer-links { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .footer-links a {
      font-size: 0.8rem; color: var(--muted);
      text-decoration: none; transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--text); }
    .footer-copy { font-size: 0.75rem; color: var(--muted); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .reveal {
      opacity: 0; transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      .hero { padding: 7rem 1.5rem 3rem; }
      .section { padding: 5rem 1.5rem; }
      .why-grid { grid-template-columns: 1fr; }
      .why-visual { display: none; }
      footer { flex-direction: column; text-align: center; padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="#" class="nav-logo">Lang<span>oo</span></a>
  <div class="nav-links">
    <a href="#comment">Comment ça marche</a>
    <a href="#profs">Les profs</a>
    <a href="#tarifs">Tarifs</a>
    <a href="#inscription" class="nav-cta">Commencer</a>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-content">
    <div class="hero-tag">
      <span class="hero-tag-dot"></span>
      Français · Anglais · Arabe
    </div>
    <h1>
      Apprends une langue<br>
      avec un <em>vrai</em> prof.<br>
      <strong>En ligne.</strong>
    </h1>
    <p class="hero-sub">
      Des cours particuliers en visio avec des enseignants certifiés.
      Choisis ton prof, réserve un créneau, progresse à ton rythme.
    </p>
    <div class="hero-actions">
      <a href="#profs" class="btn-primary">Trouver un prof →</a>
      <a href="#comment" class="btn-secondary">Comment ça marche</a>
    </div>
    <div class="hero-stats">
      <div class="stat">
        <div class="stat-num">120+</div>
